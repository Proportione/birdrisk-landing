name: copy doctrine

# BirdRisk informs; it does not advise. This gate fails the build if advisory
# language reaches the site. It runs on every push and PR touching the HTML.
on:
  push:
    paths: ['**.html', 'tools/check-doctrine.py', '.github/workflows/doctrine.yml']
  pull_request:
    paths: ['**.html', 'tools/check-doctrine.py', '.github/workflows/doctrine.yml']
  workflow_dispatch:

jobs:
  doctrine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: The site informs, it does not advise
        run: python3 tools/check-doctrine.py
